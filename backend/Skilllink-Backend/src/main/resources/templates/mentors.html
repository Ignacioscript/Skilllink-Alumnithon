<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentors List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h1 class="mb-4">Our Mentors</h1>

  <div class="alert alert-info" th:if="${mentors.empty}">
    No mentors found.
  </div>

  <div class="row row-cols-1 row-cols-md-3 g-4" th:unless="${mentors.empty}">
    <div class="col" th:each="mentor : ${mentors}">
      <div class="card h-100">
        <img th:if="${mentor.photo}" th:src="${mentor.photo}" class="card-img-top" alt="Mentor photo">
        <img th:unless="${mentor.photo}" src="https://via.placeholder.com/150" class="card-img-top" alt="Placeholder">

        <div class="card-body">
          <h5 class="card-title" th:text="${mentor.firstName + ' ' + mentor.lastName}">Mentor Name</h5>
          <p class="card-text" th:if="${mentor.bio}" th:text="${mentor.bio}">Bio information</p>

          <div class="mt-3">
            <h6>Experience:</h6>
            <p th:text="${mentor.experience ?: 'Not specified'}">Experience</p>

            <h6>Education:</h6>
            <p th:text="${mentor.education ?: 'Not specified'}">Education</p>
          </div>
        </div>

        <div class="card-footer">
          <a th:href="@{/mentors/{id}(id=${mentor.id})}" text="Details">Details</a>
          <a th:href="'mailto:' + ${mentor.email}" class="btn btn-primary">Contact</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
