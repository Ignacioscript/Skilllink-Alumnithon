<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentor Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a th:href="@{/mentors}">All Mentors</a></li>
      <li class="breadcrumb-item active" aria-current="page" th:text="${mentor.firstName + ' ' + mentor.lastName}">Mentor Name</li>
    </ol>
  </nav>

  <div class="row mt-4">
    <div class="col-md-4">
      <img th:if="${mentor.photo}" th:src="${mentor.photo}" class="img-fluid rounded" alt="Mentor photo">
      <img th:unless="${mentor.photo}" src="https://via.placeholder.com/300" class="img-fluid rounded" alt="Placeholder">

      <div class="mt-3">
        <a th:href="'mailto:' + ${mentor.email}" class="btn btn-primary w-100">Contact Mentor</a>
      </div>
    </div>

    <div class="col-md-8">
      <h1 th:text="${mentor.firstName + ' ' + mentor.lastName}">Mentor Name</h1>
      <p class="text-muted" th:text="${mentor.email}">email@example.com</p>

      <div class="card mb-4">
        <div class="card-header">
          <h4>About</h4>
        </div>
        <div class="card-body">
          <p th:text="${mentor.bio ?: 'No biography provided.'}">Bio information</p>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6">
          <div class="card mb-4">
            <div class="card-header">
              <h4>Experience</h4>
            </div>
            <div class="card-body">
              <p th:text="${mentor.experience ?: 'Not specified'}">Experience</p>
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card mb-4">
            <div class="card-header">
              <h4>Education</h4>
            </div>
            <div class="card-body">
              <p th:text="${mentor.education ?: 'Not specified'}">Education</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
